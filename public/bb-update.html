    <div class="absolute inset-0 opacity-[0.04]" style="
          background-image: url(&quot;data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3z' fill='%239C92AC' fill-opacity='1' fill-rule='evenodd'/%3E%3C/svg%3E&quot;);

  <style>
    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 92%;
      max-width: 400px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: toastIn 0.35s cubic-bezier(0.21, 1.02, 0.73, 1) forwards;
      overflow: hidden;
      position: relative;
    }

    .toast.removing {
      animation: toastOut 0.3s ease forwards;
    }

    .toast-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      border-radius: 0 0 14px 14px;
      animation: toastProgress 3s linear forwards;
    }

    .toast-success {
      background: rgba(16, 185, 129, 0.95);
      color: white;
    }

    .toast-success .toast-progress {
      background: rgba(255, 255, 255, 0.4);
    }

    .toast-error {
      background: rgba(239, 68, 68, 0.95);
      color: white;
    }

    .toast-error .toast-progress {
      background: rgba(255, 255, 255, 0.4);
    }

    .toast-warning {
      background: rgba(245, 158, 11, 0.95);
      color: white;
    }

    .toast-warning .toast-progress {
      background: rgba(255, 255, 255, 0.4);
    }

    .toast-info {
      background: rgba(59, 130, 246, 0.95);
      color: white;
    }

    .toast-info .toast-progress {
      background: rgba(255, 255, 255, 0.4);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
    }

    @keyframes toastProgress {
      from {
        width: 100%;
      }

      to {
        width: 0%;
      }
    }

    /* Ripple effect */
    .ripple {
      position: relative;
      overflow: hidden;
    }

    .ripple-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out forwards;
      pointer-events: none;
    }

    .dark .ripple-circle {
      background: rgba(255, 255, 255, 0.15);
    }

    @keyframes rippleAnim {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* ===== Stepper ===== */
    .stepper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
    }

    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .step-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      border: 2px solid #d1d5db;
      background: #f3f4f6;
      color: #9ca3af;
      transition: all 0.3s;
    }

    .dark .step-circle {
      border-color: #4b5563;
      background: #1f2937;
    }

    .step-circle.active,
    .step-circle.completed {
      border-color: #3b82f6;
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
    }

    .step-label {
      font-size: 10px;
      font-weight: 700;
      margin-top: 6px;
      color: #9ca3af;
      transition: color 0.3s;
    }

    .dark .step-label {
      color: #6b7280;
    }

    .step-label.active {
      color: #2563eb;
    }

    .dark .step-label.active {
      color: #60a5fa;
    }

    .step-line {
      flex: 1;
      height: 2px;
      margin: 0 4px;
      border-radius: 1px;
      background: #e5e7eb;
      position: relative;
      overflow: hidden;
      margin-top: -16px;
    }

    .dark .step-line {
      background: #374151;
    }

    .step-line-fill {
      position: absolute;
      inset: 0;
      background: #3b82f6;
      border-radius: 1px;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.5s;
    }

    .step-line-fill.filled {
      transform: scaleX(1);
    }

    /* ===== Bottom sheet modal ===== */
    .bottom-sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .bottom-sheet-overlay.hidden {
      display: none;
    }

    .bottom-sheet-overlay.visible {
      opacity: 1;
    }

    .bottom-sheet {
      position: relative;
      background: white;
      width: 100%;
      max-width: 32rem;
      border-radius: 1.5rem 1.5rem 0 0;
      padding: 1.5rem 1.5rem 2rem;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
      border-top: 1px solid #e5e7eb;
      transform: translateY(100%);
      transition: transform 0.3s ease-out;
    }

    .dark .bottom-sheet {
      background: #1f2937;
      border-color: #374151;
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    .bottom-sheet-handle {
      width: 40px;
      height: 4px;
      background: #d1d5db;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .dark .bottom-sheet-handle {
      background: #4b5563;
    }

    .bottom-sheet-results {
      max-height: 50vh;
      overflow-y: auto;
      padding-right: 4px;
    }
  </style>

  <script>
    function toggleInterviewDate() {
      const cb = document.getElementById("hasInterview");
      const container = document.getElementById("interview-date-container");
      const dateInput = document.getElementById("dateInterview");

      if (cb.checked) {
        container.classList.remove("hidden");
        if (window.Telegram && window.Telegram.WebApp.HapticFeedback)
          window.Telegram.WebApp.HapticFeedback.selectionChanged();
      } else {
        // Si une date est déjà remplie, demander confirmation
        if (dateInput.value && dateInput.value.trim() !== "") {
          // Re-cocher immédiatement en attendant la réponse
          cb.checked = true;

          const tg = window.Telegram?.WebApp;
          if (tg && tg.showConfirm) {
            tg.showConfirm("Are you sure you want to remove the interview?", (confirmed) => {
              if (confirmed) {
                cb.checked = false;
                container.classList.add("hidden");
                dateInput.value = "";
              }
            });
          } else {
            if (confirm("Are you sure you want to remove the interview?")) {
              cb.checked = false;
              container.classList.add("hidden");
              dateInput.value = "";
            }
          }
        } else {
          container.classList.add("hidden");
        }
      }
    }
  </script>
</body>
